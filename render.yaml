# Render deployment config for the FastAPI backend.
# NOTE: Render's free web-service tier was removed in Nov 2024.
#       Starter plan = $7/month. Alternatively use Koyeb (free tier available).
#
# To deploy:
#   1. Connect repo in render.com dashboard
#   2. Render auto-detects this file
#   3. Set the env vars marked sync:false in the dashboard

services:
  - type: web
    name: finance-api
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port $PORT
      --workers 1
    rootDir: backend

    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        value: '["https://YOUR-APP.streamlit.app"]'   # update after Streamlit deploy

      # ── Set these in the Render dashboard (never hardcode) ──────────────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: FINANCE_USER_ID
        sync: false
